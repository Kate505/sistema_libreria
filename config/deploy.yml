# Kamal deployment configuration for sistema-libreria
# Deploy target: DigitalOcean droplet + PostgreSQL accessory

# Name of your application. Used to uniquely configure containers.
service: sistema-libreria

# Name of the container image.
image: kate505/sistema-libreria

# Deploy to these servers.
servers:
  web:
    - 161.35.123.56

# Enable SSL auto certification via Let's Encrypt (kamal-proxy).
# Handles HTTPS termination, HTTP→HTTPS redirect.
proxy:
  ssl: true
  host: sistema-libreria.prometheuslab.tech

# Credentials for your image host (GitHub Container Registry).
registry:
  server: ghcr.io
  username: Kate505
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    # Run Solid Queue inside Puma for single-server deploy
    SOLID_QUEUE_IN_PUMA: true

    # Database connection — points to the DB accessory container
    DATABASE_HOST: sistema-libreria-db
    POSTGRES_USER: sistema_libreria
    POSTGRES_DB: sistema_libreria_production

    # Memory optimization for 1GB droplet
    RAILS_MAX_THREADS: 2
    WEB_CONCURRENCY: 0

    # Timezone
    TZ: America/Managua

    # Serve static files (Thruster handles caching)
    RAILS_SERVE_STATIC_FILES: true

    # Log level
    RAILS_LOG_LEVEL: info

# Aliases for common Kamal commands
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Persistent storage for Active Storage files
volumes:
  - "sistema_libreria_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404 on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  dockerfile: Dockerfile.production

# Use accessory services — PostgreSQL on same server
accessories:
  db:
    image: postgres:18
    host: 161.35.123.56
    # Bind only to local Docker network — not exposed to internet
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: sistema_libreria
        POSTGRES_DB: sistema_libreria_production
        # Memory tuning for 1GB droplet
        POSTGRES_SHARED_BUFFERS: 128MB
        POSTGRES_EFFECTIVE_CACHE_SIZE: 256MB
        POSTGRES_WORK_MEM: 4MB
      secret:
        - POSTGRES_PASSWORD
    options:
      # Limit PostgreSQL memory usage
      memory: 256m
      memory-swap: 512m
    cmd: "postgres -c shared_buffers=128MB -c effective_cache_size=256MB -c work_mem=4MB -c maintenance_work_mem=32MB"
    directories:
      - sistema_libreria_pg_data:/var/lib/postgresql
