        stock_actual: "Stock actual"
        stock_minimo_limite: "Stock mínimo"
        stock_maximo_limite: "Stock máximo"
      cliente:
        primer_nombre: "Primer nombre"
        primer_apellido: "Primer apellido"
        cedula: "Cédula"
